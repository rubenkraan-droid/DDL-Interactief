<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Domaine de Lanzac — Interactieve Kaart</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #1a1a2e;
    color: #eee;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    background: #0f3460;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 12px rgba(0,0,0,.4);
    flex-wrap: wrap;
    gap: 10px;
  }

  header h1 { font-size: 1.3rem; font-weight: 600; color: #fff; }
  header p  { font-size: .8rem; color: #aac4e4; margin-top: 2px; }

  .header-right { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }

  .legend { display: flex; gap: 16px; align-items: center; }
  .legend-item { display: flex; align-items: center; gap: 7px; font-size: .82rem; color: #cce; }
  .legend-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid rgba(255,255,255,.4); flex-shrink: 0; }

  /* Sheet sync bar */
  #sheetBar {
    width: 100%;
    background: rgba(255,255,255,.04);
    border-bottom: 1px solid rgba(255,255,255,.08);
    padding: 7px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: .8rem;
    color: #aac;
  }
  #sheetStatus { flex: 1; }
  #refreshBtn {
    background: rgba(255,255,255,.1);
    color: #cce;
    border: 1px solid rgba(255,255,255,.15);
    padding: 4px 12px;
    border-radius: 5px;
    font-size: .8rem;
    cursor: pointer;
  }
  #refreshBtn:hover { background: rgba(255,255,255,.18); }

  /* Edit mode toggle */
  #editBtn {
    background: #e67e22;
    color: #fff;
    border: none;
    padding: 7px 16px;
    border-radius: 6px;
    font-size: .85rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
  #editBtn.active { background: #27ae60; }

  .stats {
    background: rgba(255,255,255,.06);
    border-bottom: 1px solid rgba(255,255,255,.08);
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 32px;
    padding: 10px 24px;
    font-size: .82rem;
    color: #aac;
  }
  .stats span strong { color: #fff; font-size: 1rem; }

  /* Edit mode info bar */
  #editBar {
    display: none;
    width: 100%;
    background: #1a3a1a;
    border-bottom: 1px solid #27ae60;
    padding: 10px 20px;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    font-size: .85rem;
    color: #aed6a0;
  }
  #editBar.visible { display: flex; }
  #editBar strong { color: #fff; }
  #editBar code { background: rgba(255,255,255,.1); padding: 2px 6px; border-radius: 4px; font-size: .8rem; color: #cfc; }
  #copyBtn {
    background: #27ae60; color: #fff; border: none;
    padding: 6px 14px; border-radius: 5px; font-size: .82rem;
    font-weight: 600; cursor: pointer; margin-left: auto;
  }
  #copyBtn:active { background: #1e8449; }
  #copyMsg { color: #a8e6b4; font-size: .8rem; display: none; }

    .map-wrapper {
    position: relative;
    width: 100%;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,.6);
  }
  .map-wrapper svg#mapSVG {
    display: block;
    width: 100%;
    height: auto;
  }
  svg#mapSVG .kavel-pad { transition: fill .2s, opacity .2s; pointer-events: none; }
  svg#mapSVG.koppelen-mode .kavel-pad { cursor: pointer; pointer-events: all; }
  svg#mapSVG.koppelen-mode .kavel-pad:hover { stroke: #ffe066; stroke-width: 3; }
  .koppel-label { pointer-events: none; font-family: sans-serif; font-weight: 700; }

  .markers-layer { position: absolute; inset: 0; }
  .markers-layer.koppelen-door { pointer-events: none; }

  .marker {
    position: absolute;
    transform: translate(-50%, -50%);
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 2.5px solid rgba(255,255,255,.7);
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 700; color: #fff;
    cursor: pointer;
    transition: transform .1s, box-shadow .1s;
    box-shadow: 0 2px 6px rgba(0,0,0,.5);
    z-index: 10;
    text-shadow: 0 1px 2px rgba(0,0,0,.6);
    user-select: none;
  }
  .marker:hover { transform: translate(-50%,-50%) scale(1.35); z-index: 100; box-shadow: 0 4px 16px rgba(0,0,0,.7); }

  @media (max-width: 768px) {
    .marker {
      width: 16px; height: 16px;
      font-size: 5px;
      border-width: 1.5px;
      box-shadow: 0 1px 4px rgba(0,0,0,.5);
    }
    .marker:hover { transform: translate(-50%,-50%) scale(1.2); }
  }

  /* ── Locatiepins ── */
  .place-marker {
    position: absolute;
    transform: translate(-50%, -50%);
    background: rgba(15,30,50,.72);
    backdrop-filter: blur(4px);
    color: #fff;
    border: 1.5px solid rgba(255,255,255,.35);
    border-radius: 20px;
    padding: 2px 6px 2px 4px;
    font-size: 9px;
    font-weight: 600;
    white-space: nowrap;
    cursor: pointer;
    z-index: 15;
    display: flex;
    align-items: center;
    gap: 4px;
    transition: background .15s, transform .15s, box-shadow .15s;
    user-select: none;
    letter-spacing: .01em;
  }
  .place-marker:hover {
    background: rgba(15,30,50,.92);
    transform: translate(-50%,-50%) scale(1.07);
    box-shadow: 0 3px 12px rgba(0,0,0,.6);
  }
  .place-marker.has-photo { border-color: rgba(255,255,255,.6); }
  .pm-icon { width: 11px; height: 11px; flex-shrink: 0; display: block; }

  /* Round uitzicht button */
  .place-marker.uitzicht-btn {
    border-radius: 50%;
    width: 56px; height: 56px;
    padding: 0;
    flex-direction: column;
    justify-content: center;
    gap: 3px;
    font-size: 8.5px;
    font-weight: 700;
    text-align: center;
    background: rgba(10, 35, 10, 0.78);
    border: 2px solid rgba(255,255,255,.55);
    white-space: normal;
    line-height: 1.15;
    letter-spacing: .03em;
  }
  .place-marker.uitzicht-btn .pm-icon { width: 18px; height: 18px; }
  .place-marker.uitzicht-btn:hover {
    background: rgba(10,35,10,.95);
    transform: translate(-50%,-50%) scale(1.1);
    box-shadow: 0 4px 16px rgba(0,0,0,.65);
  }
  .place-marker.dragging { cursor: grabbing !important; opacity: .85; }

  /* ── Foto-tooltip ── */
  .photo-tt {
    position: fixed;
    background: #111;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,.75);
    z-index: 2000;
    width: 520px;
    pointer-events: none;
    opacity: 0;
    transition: opacity .18s;
  }
  .photo-tt.visible { opacity: 1; }
  .photo-tt img { width: 100%; display: block; height: auto; max-height: calc(100vh - 60px); object-fit: contain; }
  .photo-tt .pt-label {
    padding: 7px 11px;
    font-size: 12.5px;
    font-weight: 600;
    color: #fff;
    background: #111;
  }
  .photo-tt .pt-label-only { padding: 12px 16px; font-size: 13px; }
  .pt-count {
    position: absolute; bottom: 7px; right: 9px;
    background: rgba(0,0,0,.55); color: #fff;
    font-size: 11px; font-weight: 600;
    padding: 2px 7px; border-radius: 10px;
    pointer-events: none;
  }
  .photo-tt .pt-cycle { cursor: pointer; display: block; position: relative; }

  @media (max-width: 768px) {
    .place-marker { font-size: 7.5px; padding: 1px 5px 1px 3px; }
    .pm-icon { width: 9px; height: 9px; }
    .photo-tt { width: calc(100vw - 24px); }
    .photo-tt img { max-height: 200px; }
    #windroos svg { width: 68px !important; height: 68px !important; }
  }
  .marker.available { background: #27ae60; }
  .marker.sold      { background: #c0392b; opacity: .8; }
  .marker.under-bid { background: #e67e22; }

  /* Edit mode marker styles */
  body.edit-mode .marker {
    cursor: grab;
    opacity: 1 !important;
    border-color: #fff;
  }
  body.edit-mode .marker:hover {
    transform: translate(-50%,-50%) scale(1.5);
    box-shadow: 0 0 0 3px rgba(255,255,255,.6), 0 4px 16px rgba(0,0,0,.7);
  }
  body.edit-mode .marker.dragging {
    cursor: grabbing;
    transform: translate(-50%,-50%) scale(1.6);
    z-index: 999;
    box-shadow: 0 0 0 4px #fff, 0 6px 20px rgba(0,0,0,.8);
    transition: none;
  }

  /* Coordinate readout in edit mode */
  #coordReadout {
    position: fixed;
    bottom: 16px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,.85);
    color: #fff;
    padding: 8px 18px;
    border-radius: 20px;
    font-size: .85rem;
    font-family: monospace;
    pointer-events: none;
    display: none;
    z-index: 9999;
    border: 1px solid rgba(255,255,255,.2);
  }

  /* Tooltip */
  .tooltip {
    position: fixed;
    background: rgba(10,20,40,.97);
    border: 1px solid rgba(100,160,255,.3);
    border-radius: 10px;
    padding: 13px 16px;
    min-width: 220px; max-width: 280px;
    pointer-events: none;
    z-index: 9999;
    display: none;
    box-shadow: 0 8px 30px rgba(0,0,0,.6);
  }
  .tooltip.visible { display: block; }
  .tooltip-nr { font-size: .72rem; color: #7aacdd; margin-bottom: 2px; text-transform: uppercase; letter-spacing: 1px; }
  .tooltip-name { font-size: 1.05rem; font-weight: 700; color: #fff; margin-bottom: 6px; }
  .tooltip-status { display: inline-block; font-size: .72rem; font-weight: 700; padding: 2px 8px; border-radius: 20px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: .5px; }
  .tooltip-status.available { background: #27ae60; color: #fff; }
  .tooltip-status.sold      { background: #c0392b; color: #fff; }
  .tooltip-status.under-bid { background: #e67e22; color: #fff; }
  .tooltip-price { font-size: 1.2rem; font-weight: 700; color: #a8dfaa; margin-bottom: 8px; }
  .tooltip-row { display: flex; gap: 8px; font-size: .8rem; color: #bbd; margin-bottom: 3px; align-items: flex-start; }
  .tooltip-row .label { color: #7aacdd; min-width: 70px; flex-shrink: 0; }
  .tooltip-divider { border: none; border-top: 1px solid rgba(255,255,255,.1); margin: 8px 0; }

  svg#mapSVG.koppelen-mode .kavel-pad { cursor: pointer; pointer-events: all; }
  svg#mapSVG .kavel-pad.kavel-selected { stroke:#ffe066 !important; stroke-width:3 !important; opacity:1 !important; }
  .markers-layer.koppelen-door { pointer-events: none; }
  .kavel-nr-label { font-family:sans-serif; font-size:18px; font-weight:700;
    fill:#fff; pointer-events:none; text-shadow:0 1px 3px rgba(0,0,0,.5); }

</style>

// ─── Map webhook JSON row → property object ───────────────────────────────────
function rowToProperty(row) {
  const nr = parseInt(row['kavelnummer']);
  if (!nr) return null;
  // Kavels zonder positie worden alsnog geladen — ze krijgen een pad-koppeling
  // en hebben geen losse pin nodig.
  const pos = positions[nr] || null;

  const rawStatus = (row['status'] || '').toLowerCase().replace(/\s+/g, '');
  let status = 'sold';
  if (rawStatus.includes('beschikbaar') || rawStatus.includes('nieuwbouw')) status = 'available';
  else if (rawStatus.includes('bod') || rawStatus.includes('bid'))          status = 'under-bid';

  return {
    nr,
    status,
    name:    row['naam']      || null,
    type:    row['type']      || null,
    persons: row['personen']  || null,
    situering: row['situering'] || null,
    rendement: row['rendement'] || null,
    price:   row['prijs'] ? parseFloat(row['prijs']) : null,
    pos,
  };
}

// ─── Render: build/refresh all markers and stats ──────────────────────────────
function render() {
  layer.innerHTML = '';
  renderPlaceMarkers();
  const counts = { available: 0, 'under-bid': 0, sold: 0 };
  properties.forEach(p => counts[p.status]++);
  document.getElementById('stats').innerHTML = `
    <span><strong>${counts.available}</strong> beschikbaar</span>
    <span><strong>${counts['under-bid']}</strong> onder bod</span>
    <span><strong>${counts.sold}</strong> verkocht</span>
    <span><strong>${properties.length}</strong> totaal</span>
  `;

  // Bouw omgekeerde map: kavelnr → path-idx
  const nrToIdx = {};
  Object.entries(kavelKoppeling).forEach(([idx, nr]) => { nrToIdx[nr] = idx; });

  properties.forEach(p => {
    // Heeft dit kavel een gekoppeld SVG-pad? Dan geen losse pin.
    if (nrToIdx[p.nr] !== undefined) return;
    // Geen positie én geen pad-koppeling → overslaan
    if (!p.pos) return;

    const el = document.createElement('div');
    el.className = `marker ${p.status}`;
    el.style.left = p.pos[0] + '%';
    el.style.top  = p.pos[1] + '%';
    el.textContent = p.nr;
    el.dataset.nr  = p.nr;

    el.addEventListener('mouseenter', e => { if (!editMode) showTooltip(e, p); });
    el.addEventListener('mousemove',  e => { if (!editMode) moveTooltip(e); });
    el.addEventListener('mouseleave', ()=> { if (!editMode) hideTooltip(); });
    el.addEventListener('mousedown',  e => { if (editMode) startDrag(e, el, p); });
    el.addEventListener('touchstart', e => { if (editMode) startDrag(e, el, p); }, { passive: false });

    layer.appendChild(el);
  });

  renderKavelPaths();
}

// ─── Kavel-paden als interactieve elementen ───────────────────────────────────
function renderKavelPaths() {
  const svg = document.getElementById('mapSVG');
  if (!svg) return;

  // Verwijder oude labels en reset paden
  svg.querySelectorAll('.kavel-nr-label').forEach(el => el.remove());
  svg.querySelectorAll('.kavel-pad').forEach(p => {
    p.style.fill         = '';
    p.style.opacity      = '';
    p.style.pointerEvents = 'none';
    p.style.cursor       = '';
  });

  if (!properties.length) return;

  const ns     = 'http://www.w3.org/2000/svg';
  const colors = { available:'#27ae60', 'under-bid':'#e67e22', sold:'#c0392b' };

  Object.entries(kavelKoppeling).forEach(([idx, nr]) => {
    const p    = properties.find(q => q.nr === nr);
    const path = svg.querySelector(`.kavel-pad[data-path-idx="${idx}"]`);
    if (!p || !path) return;

    // Kleur & interactiviteit
    path.style.fill         = colors[p.status] || '#aaa';
    path.style.opacity      = '0.72';
    path.style.pointerEvents = 'all';
    path.style.cursor       = 'pointer';

    // Nummer-label centreren op het pad
    try {
      const bb   = path.getBBox();
      const text = document.createElementNS(ns, 'text');
      text.setAttribute('x', bb.x + bb.width / 2);
      text.setAttribute('y', bb.y + bb.height / 2);
      text.setAttribute('text-anchor', 'middle');
      text.setAttribute('dominant-baseline', 'middle');
      text.setAttribute('class', 'kavel-nr-label');
      text.setAttribute('fill', '#fff');
      text.setAttribute('font-size', '18');
      text.setAttribute('font-weight', 'bold');
      text.setAttribute('pointer-events', 'none');
      text.textContent = nr;
      svg.appendChild(text);
    } catch(e) {}
  });
}

// Event-delegation op SVG voor hover-tooltip en touch
(function() {
  let hoverPath = null;

  function svgPathFromPoint(x, y) {
    const elements = document.elementsFromPoint(x, y);
    const el = elements.find(el => el.classList && el.classList.contains('kavel-pad'));
    if (!el) return null;
    const idx = el.getAttribute('data-path-idx');
    const nr  = kavelKoppeling[idx];
    if (nr === undefined) return null;
    return { el, p: properties.find(q => q.nr === nr) || null };
  }

  function poiFromPoint(x, y) {
    const els = document.elementsFromPoint(x, y);
    for (const el of els) {
      const g = el.closest ? el.closest('[data-poi]') : null;
      if (g) return g;
    }
    return null;
  }

  document.getElementById('mapWrapper').addEventListener('mousemove', function(e) {
    if (editMode || koppelenMode) return;
    const hit = svgPathFromPoint(e.clientX, e.clientY);
    if (hit && hit.p) {
      if (hoverPath !== hit.el) {
        if (hoverPath) { hoverPath.style.opacity = '0.72'; }
        hoverPath = hit.el;
        hoverPath.style.opacity = '0.92';
        showTooltip(e, hit.p);
      }
      moveTooltip(e);
      if (!ttSticky && !e.target.closest('.place-marker')) hidePhotoTT();
    } else {
      if (hoverPath) { hoverPath.style.opacity = '0.72'; hoverPath = null; }
      hideTooltip();
      const poi = poiFromPoint(e.clientX, e.clientY);
      if (poi) {
        const poiId = poi.getAttribute('data-poi');
        const poiData = placeMarkers.find(p => p.id === poiId);
        if (poiData && !ttSticky) showPhotoTT(e, poiData);
      } else {
        if (!ttSticky && !e.target.closest('.place-marker')) hidePhotoTT();
      }
    }
  });

  document.getElementById('mapWrapper').addEventListener('mouseleave', function() {
    if (hoverPath) { hoverPath.style.opacity = '0.72'; hoverPath = null; }
    hideTooltip();
    if (!ttSticky) hidePhotoTT();
  });

  // Touch: tik op kavel of POI toont tooltip
  document.getElementById('mapWrapper').addEventListener('touchend', function(e) {
    if (koppelenMode) return;
    const t = e.changedTouches[0];
    const hit = svgPathFromPoint(t.clientX, t.clientY);
    if (hit && hit.p) {
      showTooltip(t, hit.p);
      return;
    }
    const poi = poiFromPoint(t.clientX, t.clientY);
    if (poi) {
      const poiId = poi.getAttribute('data-poi');
      const poiData = placeMarkers.find(p => p.id === poiId);
      if (poiData) { ttSticky = true; showPhotoTT(t, poiData); }
    }
  });

  // Click: toggle sticky POI photo
  document.getElementById('mapWrapper').addEventListener('click', function(e) {
    if (koppelenMode) return;
    const poi = poiFromPoint(e.clientX, e.clientY);
    if (poi) {
      e.stopPropagation();
      const poiId = poi.getAttribute('data-poi');
      const poiData = placeMarkers.find(p => p.id === poiId);
      if (poiData) {
        if (ttSticky) { hidePhotoTT(); }
        else { ttSticky = true; showPhotoTT(e, poiData); }
      }
    }
  });
})();

// ─── Load from Google Sheet CSV ───────────────────────────────────────────────
async function loadFromWebhook() {
  document.getElementById('sheetStatus').textContent = '⏳ Data laden…';
  try {
    const res = await fetch(WEBHOOK_URL);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const rows = await res.json();
    if (!Array.isArray(rows)) throw new Error('Onverwacht antwoord van webhook.');
    const loaded = rows.map(rowToProperty).filter(Boolean);
    if (!loaded.length) throw new Error('Geen kavels gevonden.');
    properties = loaded;
    render();
    document.getElementById('sheetStatus').textContent =
      '✓ Gesynchroniseerd — ' + new Date().toLocaleTimeString('nl-NL');
  } catch (err) {
    document.getElementById('sheetStatus').textContent = '❌ Fout: ' + err.message;
    console.error(err);
  }
}

function _clearSlide() { if (_slideTimer) { clearInterval(_slideTimer); _slideTimer = null; } }

function _renderPhotoTT(p, idx) {
  const photos = _photoList(p);
  if (!photos.length) {
    photoTT.innerHTML = `<div class="pt-label pt-label-only">${p.label}</div>`;
    return;
  }
  const multi = photos.length > 1;
  photoTT.innerHTML = `
    <div style="position:relative">
      <img src="${photos[idx]}" alt="${p.label}" loading="eager">
      ${multi ? `<div class="pt-count">${idx + 1} / ${photos.length}</div>` : ''}
    </div>
    <div class="pt-label">${p.label}</div>`;
}

function showPhotoTT(e, p) {
  _clearSlide();
  photoTT._idx = 0;
  _renderPhotoTT(p, 0);
  photoTT.classList.add('visible');
  placePhotoTT(e);
  const photos = _photoList(p);
  if (photos.length > 1) {

      photoTT._idx = (photoTT._idx + 1) % photos.length;
      _renderPhotoTT(p, photoTT._idx);

function placePhotoTT(e) {

  const vw = vp ? vp.width  : window.innerWidth;
  const ox = vp ? vp.offsetLeft : 0;
  const oy = vp ? vp.offsetTop  : 0;
  const cx = e ? (e.clientX ?? (e.touches ? e.touches[0].clientX : ox + vw / 2)) : ox + vw / 2;
  const w  = Math.min(520, vw - 16);
  let lx = cx + 16;
  if (lx + w > ox + vw - 8) lx = cx - w - 16;
  if (lx < ox + 8) lx = ox + 8;
  photoTT.style.left     = lx + 'px';
  photoTT.style.top      = (oy + 8) + 'px';
  photoTT.style.maxWidth = w + 'px';
}
function hidePhotoTT() { _clearSlide(); photoTT.classList.remove('visible'); ttSticky = false; }

if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    if (photoTT.classList.contains('visible')) placePhotoTT(null);
  });
}

document.addEventListener('click', () => { if (!ttSticky) hidePhotoTT(); });

// ─── Drag system ──────────────────────────────────────────────────────────────
const _markerPos = JSON.parse(localStorage.getItem('markerPos') || '{}');
let _drag = null, _dragMoved = false;

function _dragStart(el, id, isHTML, cx, cy) {
  const wrapper = document.getElementById('mapWrapper');
  _dragMoved = false;
  if (isHTML) {
    _drag = { el, id, isHTML: true,
      wr: wrapper.getBoundingClientRect(),
      sx: cx, sy: cy,
      startL: parseFloat(el.style.left),
      startT: parseFloat(el.style.top) };
  } else {
    const svg = document.getElementById('mapSVG');
    const pt  = svg.createSVGPoint(); pt.x = cx; pt.y = cy;
    const sp  = pt.matrixTransform(svg.getScreenCTM().inverse());
    const m   = (el.getAttribute('transform') || 'translate(0,0)').match(/translate\(([^,]+),([^)]+)\)/);
    _drag = { el, id, isHTML: false, svg,
      sx: sp.x, sy: sp.y,
      startTX: m ? parseFloat(m[1]) : 0,
      startTY: m ? parseFloat(m[2]) : 0 };
  }
  el.classList.add('dragging');
}

function _dragMove(cx, cy) {
  if (!_drag) return;
  if (_drag.isHTML) {
    const dx = (cx - _drag.sx) / _drag.wr.width  * 100;
    const dy = (cy - _drag.sy) / _drag.wr.height * 100;
    if (Math.abs(dx) + Math.abs(dy) > 0.3) _dragMoved = true;
    _drag.el.style.left = Math.max(0, Math.min(100, _drag.startL + dx)) + '%';
    _drag.el.style.top  = Math.max(0, Math.min(100, _drag.startT + dy)) + '%';
  } else {
    const pt = _drag.svg.createSVGPoint(); pt.x = cx; pt.y = cy;
    const sp = pt.matrixTransform(_drag.svg.getScreenCTM().inverse());
    const dx = sp.x - _drag.sx, dy = sp.y - _drag.sy;
    if (Math.abs(dx) + Math.abs(dy) > 1) _dragMoved = true;
    _drag.el.setAttribute('transform', `translate(${_drag.startTX+dx},${_drag.startTY+dy})`);
  }
}

function _dragEnd() {
  if (!_drag) return;
  _drag.el.classList.remove('dragging');
  if (_dragMoved) {
    if (_drag.isHTML) {
      _markerPos[_drag.id] = [parseFloat(_drag.el.style.left), parseFloat(_drag.el.style.top)];
    } else {
      const m = (_drag.el.getAttribute('transform') || '').match(/translate\(([^,]+),([^)]+)\)/);
      if (m) _markerPos['svg-' + _drag.id] = [parseFloat(m[1]), parseFloat(m[2])];
    }
    localStorage.setItem('markerPos', JSON.stringify(_markerPos));
  }
  _drag = null;
}

document.addEventListener('mousemove',  e => _dragMove(e.clientX, e.clientY));
document.addEventListener('mouseup',    () => _dragEnd());
document.addEventListener('touchmove',  e => { if (_drag) { e.preventDefault(); _dragMove(e.touches[0].clientX, e.touches[0].clientY); }}, {passive:false});
document.addEventListener('touchend',   () => _dragEnd());

function _attachHTMLDrag(el, id) {
  if (_markerPos[id]) { el.style.left = _markerPos[id][0] + '%'; el.style.top = _markerPos[id][1] + '%'; }
  el.style.cursor = 'grab';
  el.addEventListener('mousedown',  e => { e.stopPropagation(); _dragStart(el, id, true,  e.clientX, e.clientY); });
  el.addEventListener('touchstart', e => { e.stopPropagation(); _dragStart(el, id, true,  e.touches[0].clientX, e.touches[0].clientY); }, {passive:true});
}

function _attachSVGDrag(group, id) {
  if (_markerPos['svg-' + id]) {
    const [tx, ty] = _markerPos['svg-' + id];
    group.setAttribute('transform', `translate(${tx},${ty})`);
  }
  group.style.cursor = 'grab';
  group.addEventListener('mousedown',  e => { if (koppelenMode || editMode) return; e.stopPropagation(); _dragStart(group, id, false, e.clientX, e.clientY); });
  group.addEventListener('touchstart', e => { if (koppelenMode || editMode) return; e.stopPropagation(); _dragStart(group, id, false, e.touches[0].clientX, e.touches[0].clientY); }, {passive:true});
}

function renderPlaceMarkers() {
  placeMarkers.forEach(p => {
    if (p.hidden) return;
    const isUitzicht = p.id.startsWith('uitzicht');
    const el = document.createElement('div');
    el.className = 'place-marker' + (p.photo ? ' has-photo' : '') + (isUitzicht ? ' uitzicht-btn' : '');
    el.innerHTML = `<img class="pm-icon" src="data:image/svg+xml,${encodeURIComponent(p.icon)}" alt=""><span>${p.label}</span>`;
    el.style.left = p.pos[0] + '%';
    el.style.top  = p.pos[1] + '%';
    layer.appendChild(el);

    if (!isUitzicht) _attachHTMLDrag(el, p.id);

    // Hover (skip if dragging)
    el.addEventListener('mouseenter', e => { if (!ttSticky && !_dragMoved) showPhotoTT(e, p); });
    el.addEventListener('mousemove',  e => { if (!ttSticky) placePhotoTT(e); });
    el.addEventListener('mouseleave', ()  => { if (!ttSticky) hidePhotoTT(); });

    // Click/tap: only if not a drag
    el.addEventListener('click', e => {
      e.stopPropagation();
      if (_dragMoved) return;
      if (ttSticky) { hidePhotoTT(); } else { ttSticky = true; showPhotoTT(e, p); }
    });
    el.addEventListener('touchend', e => {
      e.preventDefault(); e.stopPropagation();
      if (_dragMoved) return;
      const t = e.changedTouches[0];
      if (ttSticky) { hidePhotoTT(); } else { ttSticky = true; showPhotoTT(t, p); }
    });
  });
}
renderPlaceMarkers();

// ─── Edit mode ────────────────────────────────────────────────────────────────
function toggleEdit() {
  editMode = !editMode;
  document.body.classList.toggle('edit-mode', editMode);
  editBtn.textContent = editMode ? '✅ Klaar' : '✏️ Pinnen aanpassen';
  editBtn.classList.toggle('active', editMode);
  editBar.classList.toggle('visible', editMode);
  coordRO.style.display = editMode ? 'block' : 'none';
  hideTooltip();
}

function startDrag(e, el, p) {
  e.preventDefault();
  hideTooltip();

  const wrapper = document.getElementById('mapWrapper');
  el.classList.add('dragging');

  function getPos(ev) {
    const touch = ev.touches ? ev.touches[0] : ev;
    const rect = wrapper.getBoundingClientRect();
    const x = Math.min(100, Math.max(0, (touch.clientX - rect.left) / rect.width  * 100));
    const y = Math.min(100, Math.max(0, (touch.clientY - rect.top)  / rect.height * 100));
    return [x, y];
  }

  function onMove(ev) {
    ev.preventDefault();
    const [x, y] = getPos(ev);
    el.style.left = x + '%';
    el.style.top  = y + '%';
    p.pos[0] = x;
    p.pos[1] = y;
    const txt = `Nr. ${p.nr} → x: ${fmt(x)}%  y: ${fmt(y)}%`;
    liveCoord.textContent = txt;
    coordRO.textContent   = txt;
  }

  function onUp() {
    el.classList.remove('dragging');
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup',   onUp);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend',  onUp);
  }

  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup',   onUp);
  document.addEventListener('touchmove', onMove, { passive: false });
  document.addEventListener('touchend',  onUp);
}

function copyPositions() {
  const lines = properties.map(p =>
    `  { nr:${String(p.nr).padEnd(2)}, pos:[${fmt(p.pos[0])}, ${fmt(p.pos[1])}] },`
  );
  const text = '// Posities na handmatige correctie\n' + lines.join('\n');
  navigator.clipboard.writeText(text).then(() => {
    const msg = document.getElementById('copyMsg');
    msg.style.display = 'inline';
    setTimeout(() => msg.style.display = 'none', 2000);
  });
}

// ─── Tooltip ──────────────────────────────────────────────────────────────────
function showTooltip(e, p) {
  const rows = [];
  if (p.name)    rows.push(`<div class="tooltip-row"><span class="label">Naam</span><span>${p.name}</span></div>`);
  if (p.type)    rows.push(`<div class="tooltip-row"><span class="label">Type</span><span>${p.type}</span></div>`);
  if (p.persons) rows.push(`<div class="tooltip-row"><span class="label">Personen</span><span>${p.persons}</span></div>`);
  if (p.sqm)     rows.push(`<div class="tooltip-row"><span class="label">Oppervlak</span><span>${p.sqm} m²</span></div>`);
  if (p.pool)    rows.push(`<div class="tooltip-row"><span class="label">Zwembad</span><span>${p.pool}</span></div>`);

  const priceHtml = p.status === 'under-bid'
    ? `<div class="tooltip-price" style="color:#f0a050">Onder bod</div>`
    : p.price ? `<div class="tooltip-price">${formatPrice(p.price)}</div>` : '';

  tooltip.innerHTML = `
    <div class="tooltip-nr">Nr. ${p.nr}</div>
    <div class="tooltip-name">${p.name || (p.status === 'sold' ? 'Verkocht' : 'Woning ' + p.nr)}</div>
    <span class="tooltip-status ${p.status}">${statusLabel(p.status)}</span>
    ${priceHtml}
    ${rows.length ? '<hr class="tooltip-divider">' + rows.join('') : ''}
  `;
  moveTooltip(e);
  tooltip.classList.add('visible');
}

function _tooltipZoom() {
  const visW = window.visualViewport ? window.visualViewport.width : window.innerWidth;
  tooltip.style.zoom = Math.min(1, (visW - 16) / 280);
}

function moveTooltip(e) {
  _tooltipZoom();
  const vp  = window.visualViewport;
  const ox  = vp ? vp.offsetLeft : 0;
  const oy  = vp ? vp.offsetTop  : 0;
  const sc  = vp ? (vp.scale || 1) : 1;
  const visW = vp ? vp.width  : window.innerWidth;
  const visH = vp ? vp.height : window.innerHeight;
  const tw = tooltip.offsetWidth, th = tooltip.offsetHeight, pad = 12;
  let x = e.clientX + 16, y = e.clientY + 16;
  if (x + tw + pad > ox + visW * sc)  x = e.clientX - tw - 16;
  if (y + th + pad > oy + visH * sc)  y = e.clientY - th - 16;
  if (x < ox + pad) x = ox + pad;
  if (y < oy + pad) y = oy + pad;
  tooltip.style.left = x + 'px';
  tooltip.style.top  = y + 'px';
}

function hideTooltip() { tooltip.classList.remove('visible'); }

if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', () => {
    if (tooltip.classList.contains('visible')) _tooltipZoom();
  });
}


// ─── Kavel-pad koppeling ─────────────────────────────────────────────────────
const KOPPELING_DEFAULT = {"0":53,"1":52,"2":51,"3":48,"4":32,"5":33,"6":34,"7":35,"8":36,"9":37,"11":38,"12":39,"13":40,"14":41,"15":42,"16":43,"17":44,"18":45,"19":46,"21":1,"22":2,"23":3,"24":4,"25":5,"26":6,"27":7,"28":8,"29":9,"30":10,"31":11,"32":12,"33":13,"34":27,"35":28,"36":26,"37":25,"38":24,"39":23,"40":22,"41":21,"42":20,"43":19,"44":18,"46":17,"47":16,"48":15,"49":14,"50":47,"51":29,"52":30,"53":31,"54":50,"55":49};
// Gebruik lokaal opgeslagen versie als die bestaat (voor aanpassingen via koppelmodus),
// anders de ingebakken standaard.
let kavelKoppeling = JSON.parse(localStorage.getItem('kavelKoppeling') || JSON.stringify(KOPPELING_DEFAULT));
// { "path-idx": kavelnummer }

function saveKoppeling() {
  localStorage.setItem('kavelKoppeling', JSON.stringify(kavelKoppeling));
  const n = Object.keys(kavelKoppeling).length;
  const prog = document.getElementById('koppelProgress');
  if (prog) prog.textContent = n + '/56 gekoppeld';
}

function updateKavelPadColors() {
  renderKavelPaths();
}

// ── Koppel-panel ──────────────────────────────────────────────────────────────
let koppelenMode   = false;
let selectedPath   = null;

function toggleKoppelen() {
  koppelenMode = !koppelenMode;
  const btn   = document.getElementById('koppelenBtn');
  const panel = document.getElementById('koppelPanel');
  const svg   = document.getElementById('mapSVG');
  const ml    = document.getElementById('markersLayer');

  btn.textContent = koppelenMode ? '✅ Stoppen' : '🔗 Kavels koppelen';
  btn.classList.toggle('active', koppelenMode);
  panel.style.display = koppelenMode ? 'flex' : 'none';
  svg.classList.toggle('koppelen-mode', koppelenMode);
  ml.classList.toggle('koppelen-door', koppelenMode);

  if (!koppelenMode) {
    deselectPath();
    updateKavelPadColors(); // herstelt pointer-events per pad
  } else {
    // Zet ALLE kavel-paden klikbaar via inline style —
    // overschrijft de inline pointer-events:none die renderKavelPaths zet
    svg.querySelectorAll('.kavel-pad').forEach(p => {
      p.style.pointerEvents = 'all';
      p.style.cursor = 'pointer';
    });
    refreshKoppelHighlights();
    saveKoppeling();
  }
}

function refreshKoppelHighlights() {
  const svg = document.getElementById('mapSVG');
  const ongekoppeld = [];
  svg.querySelectorAll('.kavel-pad').forEach(p => {
    const idx = p.getAttribute('data-path-idx');
    const nr  = kavelKoppeling[idx];
    if (nr !== undefined) {
      const colors = { available:'#27ae60', 'under-bid':'#e67e22', sold:'#c0392b' };
      const prop = properties.find(q => q.nr === nr);
      p.style.fill    = prop ? (colors[prop.status] || '#888') : '#888';
      p.style.opacity = '0.72';
    } else {
      p.style.fill    = 'rgba(80,130,255,0.38)';
      p.style.opacity = '1';
      ongekoppeld.push(idx);
    }
  });
  const n = Object.keys(kavelKoppeling).length;
  const prog = document.getElementById('koppelProgress');
  if (prog) prog.textContent = n + '/56 gekoppeld';

  // Toon lijst van ongekoppelde paden als knoppen
  const el = document.getElementById('koppelOngekoppeld');
  if (el && ongekoppeld.length) {
    el.innerHTML = 'Niet gekoppeld — klik om te selecteren:<br>' +
      ongekoppeld.map(idx =>
        `<button onclick="selectPathByIdx('${idx}')" style="
          margin:2px;padding:3px 7px;border-radius:4px;border:1px solid #3a5068;
          background:#0f1c27;color:#7aacdd;cursor:pointer;font-size:.78rem">
          Pad ${idx}
        </button>`
      ).join('');
  } else if (el) {
    el.innerHTML = '';
  }
}

function selectPathByIdx(idx) {
  const svg  = document.getElementById('mapSVG');
  const path = svg.querySelector(`.kavel-pad[data-path-idx="${idx}"]`);
  if (!path) return;
  if (selectedPath) selectedPath.classList.remove('kavel-selected');
  selectedPath = path;
  path.classList.add('kavel-selected');
  const current = kavelKoppeling[idx];
  document.getElementById('koppelPathInfo').textContent =
    `Pad #${idx}${current !== undefined ? ' → kavel ' + current : ''}`;
  const inp = document.getElementById('koppelInput');
  inp.value = current !== undefined ? current : '';
  inp.focus();
  // Scroll pad in beeld
  path.scrollIntoView({ behavior:'smooth', block:'center' });
}

function deselectPath() {
  if (selectedPath) {
    selectedPath.classList.remove('kavel-selected');
    selectedPath = null;
  }
  document.getElementById('koppelPathInfo').textContent = 'Klik op een kavel-vlak';
  document.getElementById('koppelInput').value = '';
}

// Klik op kavel-pad
document.addEventListener('click', function(e) {
  if (!koppelenMode) return;
  const path = e.target.closest('.kavel-pad');
  if (!path) return;
  e.stopPropagation();

  // Deselecteer vorige
  if (selectedPath) selectedPath.classList.remove('kavel-selected');
  selectedPath = path;
  path.classList.add('kavel-selected');

  const idx  = path.getAttribute('data-path-idx');
  const current = kavelKoppeling[idx];
  document.getElementById('koppelPathInfo').textContent = `Pad #${idx}${current !== undefined ? ' → kavel ' + current : ''}`;
  const inp = document.getElementById('koppelInput');
  inp.value = current !== undefined ? current : '';
  inp.focus();
});

function koppelOpslaan() {
  if (!selectedPath) return;
  const idx   = selectedPath.getAttribute('data-path-idx');
  const val   = document.getElementById('koppelInput').value.trim();

  if (val === '') {
    delete kavelKoppeling[idx];
  } else {
    const nr = parseInt(val);
    if (isNaN(nr) || nr < 1) return;
    // Verwijder eventuele bestaande koppeling voor dit nr
    Object.keys(kavelKoppeling).forEach(k => {
      if (kavelKoppeling[k] === nr) delete kavelKoppeling[k];
    });
    kavelKoppeling[idx] = nr;
  }
  saveKoppeling();
  refreshKoppelHighlights();
  deselectPath();
}

function koppelVerwijderen() {
  if (!selectedPath) return;
  const idx = selectedPath.getAttribute('data-path-idx');
  delete kavelKoppeling[idx];
  saveKoppeling();
  refreshKoppelHighlights();
  deselectPath();
}

// Enter = opslaan
document.addEventListener('keydown', function(e) {
  if (!koppelenMode) return;
  if (e.key === 'Enter') koppelOpslaan();
  if (e.key === 'Escape') deselectPath();
});

function kopieerKoppeling() {
  const text = JSON.stringify(kavelKoppeling);
  navigator.clipboard.writeText(text).then(() => {
    const msg = document.getElementById('kopieMsg');
    msg.style.display = 'block';
    setTimeout(() => msg.style.display = 'none', 2000);
  });
}

// Laad opgeslagen koppeling bij start
window.addEventListener('load', () => {
  const n = Object.keys(kavelKoppeling).length;
  if (n > 0) {
    const prog = document.getElementById('koppelProgress');
    if (prog) prog.textContent = n + '/56 gekoppeld';
    setTimeout(updateKavelPadColors, 300);
  }
});

</script>
